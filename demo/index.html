<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/initStyle.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <div class="d-flex gap-2 m-3 flex-wrap">
    <button class="btn btn-primary btn-sm" id="loadModel1"> GB48IB-MPB</button>
    <button class="btn btn-primary btn-sm" id="loadModel6"> B1827FHLIB-MPB</button>
    <button class="btn btn-primary btn-sm" id="loadModel2"> B1827FHRIB-MPB</button>
    <button class="btn btn-primary btn-sm" id="loadModel3"> B3D1827IB-MPB</button>
     <button class="btn btn-primary btn-sm" id="loadModel9"> SBB18LIB-MPB</button>
    <button class="btn btn-primary btn-sm" id="loadModel4"> SBB18RIB-MPB</button>
    <button class="btn btn-primary btn-sm" id="loadModel7"> B1827LIB-MPB</button>
    <button class="btn btn-primary btn-sm" id="loadModel8"> B1827RIB-MPB</button>
   <button class="btn btn-primary btn-sm" id="loadModel5"> BEP28.530-2PK</button>

    <button class="btn btn-danger btn-sm" id="deleteButton" style="display: none;">Delete Selected</button>
    <!-- <button class="btn btn-success btn-sm" id="centerButton">Center Layout</button> -->
  </div>
  <div id="app"></div>
  <script src="../three/initmap.js"></script>
  <script type="module">
    import * as THREE from "three";
    import { Viewer } from "../three/core/Viewer.js";
    import  PickTool  from "../three/tools/pick/PickTool.js";
    import  DragTool  from "../three/tools/drag/DragTool.js";
    import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";
    const container = document.getElementById("app");

    const viewer = new Viewer(container, {
      tools: {
        pick: true,
      }
    });
console.log(viewer.layoutManager);


    const pick = new PickTool(viewer, {
      focus: {
        enabled: true,
     //   distance: 3,
        duration: 0.35
      }
    });


    const deleteButton = document.getElementById('deleteButton');

    pick.hooks.onSelect = function(tool, object) {
        deleteButton.style.display = 'inline-block';
    };

    pick.hooks.onClear = function(tool) {
        deleteButton.style.display = 'none';
    };

    deleteButton.addEventListener('click', function() {
        const selectedObject = pick.selectedObject;
        if (selectedObject) {
            if (selectedObject.parent) {
                selectedObject.parent.remove(selectedObject);
            }
            pick.clearSelection();
            // 删除模型后调整布局和相机
            viewer.layoutCenter();
            viewer.fitCameraToObjects();
        }
    });

    viewer.tools.register("pick", pick);
    viewer.tools.enable("pick");

    
// 初始化DragTool，传入WorldManager实例
const drag = new DragTool(viewer, {
  worldManager: viewer.getWorldManager()
});

viewer.tools.register("drag", drag);
    viewer.tools.enable("drag");

    const loadModel1Btn = document.getElementById('loadModel1');
    const loadModel2Btn = document.getElementById('loadModel2');
    const loadModel3Btn = document.getElementById('loadModel3');
    const loadModel4Btn = document.getElementById('loadModel4');
    
    // 使用新的模型添加接口
    loadModel1Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/GB48IB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 1:", error);
      }
    });
    
    loadModel2Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/B1827FHRIB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 2:", error);
      }
    });
    
    loadModel3Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/B3D1827IB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 3:", error);
      }
    });
    
    loadModel4Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/SBB18RIB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 4:", error);
      }
    });
    
    // 添加其他按钮的事件处理函数
    const loadModel5Btn = document.getElementById('loadModel5');
    const loadModel6Btn = document.getElementById('loadModel6');
    const loadModel7Btn = document.getElementById('loadModel7');
    const loadModel8Btn = document.getElementById('loadModel8');
    const loadModel9Btn = document.getElementById('loadModel9');
    
    loadModel5Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/BEP28.530-2PK.glb");
      } catch (error) {
        console.error("Error loading model 5:", error);
      }
    });
    
    loadModel6Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/B1827FHLIB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 6:", error);
      }
    });
    
    loadModel7Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/B1827LIB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 7:", error);
      }
    });
    
    loadModel8Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/B1827RIB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 8:", error);
      }
    });
    
    loadModel9Btn.addEventListener('click', async () => {
      try {
        await viewer.addModel("../glb/SBB18LIB-MPB.glb");
      } catch (error) {
        console.error("Error loading model 9:", error);
      }
    });
    
    async function initializeScene() {
      try {
        // 使用批量加载模型的方法，按照index5.html的方式加载多个模型
        await viewer.addModels([
          "../glb/GB48IB-MPB.glb",
          "../glb/B1827FHRIB-MPB.glb",
          "../glb/B3D1827IB-MPB.glb",
          "../glb/SBB18RIB-MPB.glb",
          "../glb/B1827RIB-MPB.glb"
        ]);
      } catch (error) {
        console.error("Error loading models:", error);
      }
    }

    initializeScene();
    viewer.start();
  </script>

</body>

</html>
