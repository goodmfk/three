<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR - 摄像头背景 + 3D叠加</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
    #camera {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: 0;
      background: #000;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      touch-action: none;
    }
    #info {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      color: #fff;
      background: rgba(0,0,0,0.55);
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 92vw;
      text-align: center;
      font-size: 14px;
      line-height: 1.35;
    }
    #ui {
      position: fixed;
      left: 50%; bottom: 18px;
      transform: translateX(-50%);
      display: flex; gap: 10px;
      z-index: 3;
      background: rgba(0,0,0,0.55);
      padding: 10px 12px;
      border-radius: 12px;
      align-items: center;
    }
    #ui button {
      background: #6aa9ff;
      color: #fff;
      border: 0;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #ui button:active { transform: scale(0.98); }
    #toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      background: rgba(255,0,0,0.85);
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      display: none;
      max-width: 85vw;
      text-align: center;
      font-size: 14px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <video id="camera" autoplay playsinline muted></video>
  <div id="info">这是AR效果：摄像头背景 + 3D模型叠加</div>
  <div id="toast"></div>

  <div id="ui">
    <button id="start-camera">打开摄像头</button>
    <button id="add-model">添加模型</button>
    <button id="clear-models">清空</button>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const video = document.getElementById("camera");

    let renderer, scene, camera;
    let modelCount = 0;
    let placed = [];

    let isDragging = false;
    let dragTarget = null;
    let dragDepth = 2.2;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 2200);
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        toast("当前浏览器不支持 getUserMedia，无法打开摄像头");
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        video.srcObject = stream;
        toast("摄像头已打开");
      } catch (e) {
        toast("摄像头权限被拒绝或不可用，请在浏览器设置里允许摄像头");
      }
    }

    function initThree() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 50);
      camera.position.set(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.9);
      scene.add(ambient);

      const dir = new THREE.DirectionalLight(0xffffff, 0.7);
      dir.position.set(1, 2, 1);
      scene.add(dir);

      window.addEventListener("resize", onResize);

      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });

      renderer.domElement.addEventListener("pointerdown", onPointerDown, { passive: false });
      renderer.domElement.addEventListener("pointermove", onPointerMove, { passive: false });
      renderer.domElement.addEventListener("pointerup", onPointerUp, { passive: false });
      renderer.domElement.addEventListener("pointercancel", onPointerUp, { passive: false });
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function addModel() {
      const loader = new GLTFLoader();
      
      loader.load('../glb/GB48IB-MPB.glb', function (gltf) {
        const model = gltf.scene;
        model.position.set(0, 0, -dragDepth);
        model.scale.set(0.5, 0.5, 0.5);
        
        scene.add(model);
        placed.push(model);
        dragTarget = model;
        modelCount++;
        toast(`已添加模型 ${modelCount}（可按住拖动移动）`);
      }, function (xhr) {
        console.log((xhr.loaded / xhr.total * 100) + '% loaded');
      }, function (error) {
        console.error('Error loading model:', error);
        toast('模型加载失败，请检查文件路径');
      });
    }

    function clearModels() {
      for (const obj of placed) scene.remove(obj);
      placed = [];
      modelCount = 0;
      dragTarget = null;
      toast("已清空所有模型");
    }

    function setPointerFromEvent(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      pointer.x = x * 2 - 1;
      pointer.y = -(y * 2 - 1);
    }

    function intersectPlaced() {
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObjects(placed, true);
    }

    function pointAtDepth(depth) {
      raycaster.setFromCamera(pointer, camera);
      const p = new THREE.Vector3().copy(raycaster.ray.direction).multiplyScalar(depth);
      return p;
    }

    function onPointerDown(e) {
      e.preventDefault();
      if (!placed.length) return;

      setPointerFromEvent(e);
      const hits = intersectPlaced();

      if (hits.length) {
        isDragging = true;
        // 找到所属的整个模型
        let clickedObject = hits[0].object;
        // 遍历placed数组，找到包含clickedObject的模型
        for (const model of placed) {
          if (model === clickedObject || model.contains(clickedObject)) {
            dragTarget = model;
            break;
          }
        }
        if (!dragTarget) {
          dragTarget = placed[placed.length - 1];
        }
        const p = new THREE.Vector3().setFromMatrixPosition(dragTarget.matrixWorld);
        dragDepth = Math.max(0.6, -p.z);
      } else {
        dragTarget = placed[placed.length - 1];
      }
    }

    function onPointerMove(e) {
      if (!isDragging || !dragTarget) return;
      e.preventDefault();

      setPointerFromEvent(e);
      const p = pointAtDepth(dragDepth);
      dragTarget.position.set(p.x, p.y, -dragDepth);
    }

    function onPointerUp(e) {
      e.preventDefault();
      isDragging = false;
    }

    document.getElementById("start-camera").addEventListener("click", (e) => {
      e.preventDefault();
      startCamera();
    });

    document.getElementById("add-model").addEventListener("click", (e) => {
      e.preventDefault();
      addModel();
    });

    document.getElementById("clear-models").addEventListener("click", (e) => {
      e.preventDefault();
      clearModels();
    });

    initThree();
  </script>
</body>
</html>
